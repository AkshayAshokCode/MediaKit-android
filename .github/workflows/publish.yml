name: Publish

# Publishing is done locally — signing keys are not stored in CI.
# This workflow is intentionally disabled (no trigger).
# To publish a release, run locally:
#
#   ./gradlew :mediakit-core:publishAllPublicationsToMavenCentralRepository
#   ./gradlew :imagepicker:publishAllPublicationsToMavenCentralRepository
#   ./gradlew :imagecropper:publishAllPublicationsToMavenCentralRepository
#   ./gradlew :mediapicker:publishAllPublicationsToMavenCentralRepository
#   ./gradlew :imagecompressor:publishAllPublicationsToMavenCentralRepository
#   ./gradlew :audiorecorder:publishAllPublicationsToMavenCentralRepository
#   ./gradlew :videocompressor:publishAllPublicationsToMavenCentralRepository
#   ./gradlew :mediapreviewer:publishAllPublicationsToMavenCentralRepository
#   ./gradlew :mediakit-bom:publishAllPublicationsToMavenCentralRepository
#
# Requires ~/.gradle/gradle.properties to contain:
#   mavenCentralUsername, mavenCentralPassword, signing.keyId,
#   signing.password, signing.secretKeyRingFile

on:
  workflow_dispatch:
